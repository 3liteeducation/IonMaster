<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3lite Education - 離子組合大挑戰</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            background-color: #f4f7f6; padding: 10px; margin: 0;
        }
        .card { 
            background: white; padding: 25px; border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; 
            width: 95%; max-width: 500px; box-sizing: border-box;
            border-top: 6px solid #2ecc71; 
        }

        /* 主選單按鈕 */
        .menu-btn {
            width: 100%; padding: 15px; margin: 10px 0; font-size: 18px; font-weight: bold;
            border: none; border-radius: 12px; cursor: pointer; transition: 0.2s; color: white;
        }
        .btn-speed { background-color: #e74c3c; }
        .btn-speed:hover { background-color: #c0392b; transform: translateY(-2px); }
        .btn-practice { background-color: #3498db; }
        .btn-practice:hover { background-color: #2980b9; transform: translateY(-2px); }
        .btn-quit { background-color: #95a5a6; color: white; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; margin-top: 15px;}

        /* 頂部狀態列 */
        .status-bar {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 15px; padding: 10px; background: #fdfdfd; border-radius: 10px; font-size: 15px; font-weight: bold;
        }
        .battery {
            width: 60px; height: 25px; border: 2px solid #2c3e50; border-radius: 4px;
            position: relative; padding: 1px;
        }
        .battery::after {
            content: ''; position: absolute; right: -6px; top: 5px; width: 4px; height: 12px; background: #2c3e50;
        }
        .battery-level { height: 100%; width: 0%; background: #2ecc71; transition: width 0.3s; }
        .timer { font-family: monospace; font-size: 18px; color: #e67e22; }

        .ion-display { 
            font-size: 32px; font-weight: bold; color: #2c3e50; 
            margin: 15px 0; min-height: 90px; display: flex; justify-content: center; align-items: center; flex-direction: column;
            background: #f9f9f9; border-radius: 12px; border: 1px solid #ddd; font-family: 'Times New Roman', serif; 
            line-height: 1.3;
        }

        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .option-btn {
            background-color: #fff; border: 2px solid #bdc3c7; padding: 15px 5px; font-size: 20px; 
            font-family: 'Times New Roman', serif; border-radius: 10px; cursor: pointer; transition: 0.2s; min-height: 70px;
        }
        .option-btn:hover:not(:disabled) { background-color: #f1f8ff; border-color: #3498db; }
        .option-btn.correct { background-color: #2ecc71; color: white; border-color: #27ae60; }
        .option-btn.wrong { background-color: #e74c3c; color: white; border-color: #c0392b; }

        /* 彈窗樣式 */
        #resultModal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 100; justify-content: center; align-items: center;
        }
        .modal-content { background: white; padding: 25px; border-radius: 20px; width: 85%; max-width: 400px; text-align: center; }
        .best-time-box { background: #fff8e1; border: 2px solid #f1c40f; border-radius: 10px; padding: 10px; margin: 15px 0; }
        
        sub, sup { font-size: 0.55em; }
    </style>
</head>
<body>

    <h2 style="margin: 10px 0;">🧪 A.A. Sir's Ion Master</h2>

    <div class="card">
        <div id="menuArea">
            <p style="color: #7f8c8d; margin-bottom: 25px;">3lite Education - 專業化學訓練</p>

            <button class="menu-btn btn-speed" onclick="startGame('speed')">⚡ 速度模式 (10題計時挑戰)</button>
            <button class="menu-btn btn-practice" onclick="startGame('practice')">🧠 練習模式 (無限題數特訓)</button>
        </div>

        <div id="gameArea" style="display: none;">
            <div class="status-bar">
                <div id="progressText" style="color: #3498db;">進度: 0/10</div>
                <div class="timer" id="timerDisplay">00:00.0</div>
                <div class="battery"><div class="battery-level" id="batteryLevel"></div></div>
            </div>

            <div class="ion-display" id="question"><span>載入中...</span></div>
            <div class="options-grid" id="optionsArea"></div>

            <button class="btn-quit" onclick="quitGame()">返回主選單</button>
        </div>
    </div>

    <div id="resultModal">
        <div class="modal-content">
            <h2 style="margin-top: 0;">🎯 挑戰完成！</h2>
            <p style="margin: 5px 0;">本次時間：</p>
            <div id="finalTime" style="font-size:36px; color:#e74c3c; font-weight:bold; margin-bottom: 10px;"></div>
            
            <div class="best-time-box">
                <div style="color: #f39c12; font-weight: bold;">👑 歷史最佳紀錄 (PB)</div>
                <div id="bestTimeDisplay" style="font-size: 24px; font-weight: bold; color: #2c3e50;">--</div>
            </div>
            
            <button onclick="quitGame()" style="margin-top:20px; padding:12px 25px; background:#3498db; color:white; border:none; border-radius:10px; font-size: 16px; cursor:pointer; width: 100%;">
                返回主選單
            </button>
        </div>
    </div>

    <script>
        // 化學數據庫
        const cations = [
            { name: "Sodium ion", formula: "Na", charge: 1, html: "Na<sup>+</sup>" },
            { name: "Potassium ion", formula: "K", charge: 1, html: "K<sup>+</sup>" },
            { name: "Copper(I) ion", formula: "Cu", charge: 1, html: "Cu<sup>+</sup>" },
            { name: "Silver ion", formula: "Ag", charge: 1, html: "Ag<sup>+</sup>" },
            { name: "Hydrogen ion", formula: "H", charge: 1, html: "H<sup>+</sup>" },
            { name: "Ammonium ion", formula: "NH4", charge: 1, html: "NH<sub>4</sub><sup>+</sup>", poly: true },
            { name: "Magnesium ion", formula: "Mg", charge: 2, html: "Mg<sup>2+</sup>" },
            { name: "Calcium ion", formula: "Ca", charge: 2, html: "Ca<sup>2+</sup>" },
            { name: "Barium ion", formula: "Ba", charge: 2, html: "Ba<sup>2+</sup>" },
            { name: "Iron(II) ion", formula: "Fe", charge: 2, html: "Fe<sup>2+</sup>" },
            { name: "Copper(II) ion", formula: "Cu", charge: 2, html: "Cu<sup>2+</sup>" },
            { name: "Zinc ion", formula: "Zn", charge: 2, html: "Zn<sup>2+</sup>" },
            { name: "Aluminium ion", formula: "Al", charge: 3, html: "Al<sup>3+</sup>" },
            { name: "Iron(III) ion", formula: "Fe", charge: 3, html: "Fe<sup>3+</sup>" }
        ];

        const anions = [
            { name: "Hydride ion", formula: "H", charge: 1, html: "H<sup>-</sup>" },
            { name: "Chloride ion", formula: "Cl", charge: 1, html: "Cl<sup>-</sup>" },
            { name: "Bromide ion", formula: "Br", charge: 1, html: "Br<sup>-</sup>" },
            { name: "Iodide ion", formula: "I", charge: 1, html: "I<sup>-</sup>" },
            { name: "Hydroxide ion", formula: "OH", charge: 1, html: "OH<sup>-</sup>", poly: true },
            { name: "Nitrate ion", formula: "NO3", charge: 1, html: "NO<sub>3</sub><sup>-</sup>", poly: true },
            { name: "Oxide ion", formula: "O", charge: 2, html: "O<sup>2-</sup>" },
            { name: "Sulphate ion", formula: "SO4", charge: 2, html: "SO<sub>4</sub><sup>2-</sup>", poly: true },
            { name: "Carbonate ion", formula: "CO3", charge: 2, html: "CO<sub>3</sub><sup>2-</sup>", poly: true },
            { name: "Phosphate ion", formula: "PO4", charge: 3, html: "PO<sub>4</sub><sup>3-</sup>", poly: true }
        ];

        let currentMode = '';
        let curC, curA, score = 0, startTime, timerInterval;
        let isAnswered = false;
        let usedQuestions = new Set(); 

        const menuArea = document.getElementById('menuArea');
        const gameArea = document.getElementById('gameArea');
        const questionEl = document.getElementById('question');
        const optionsArea = document.getElementById('optionsArea');
        const progressText = document.getElementById('progressText');
        const timerDisplay = document.getElementById('timerDisplay');
        const batteryLevel = document.getElementById('batteryLevel');

        // 黑名單系統
        function isValidCombination(c, a) {
            const blacklist = ['NH4_OH', 'H_NO3', 'H_Cl', 'H_Br', 'H_I', 'H_SO4', 'H_OH', 'H_O', 'H_CO3', 'H_PO4'];
            return !blacklist.includes(c.formula + '_' + a.formula);
        }

        // 遊戲流程
        function startGame(mode) {
            currentMode = mode;
            score = 0;
            usedQuestions.clear();
            
            menuArea.style.display = 'none';
            gameArea.style.display = 'block';
            batteryLevel.style.width = '0%';

            if (mode === 'speed') {
                progressText.innerText = "進度: 0/10";
                timerDisplay.style.display = 'block';
                startTime = Date.now();
                timerInterval = setInterval(() => {
                    timerDisplay.innerText = ((Date.now() - startTime) / 1000).toFixed(1) + "s";
                }, 100);
            } else {
                progressText.innerText = "已答對: 0 題";
                timerDisplay.style.display = 'none';
            }

            nextQuestion();
        }

        function quitGame() {
            clearInterval(timerInterval);
            document.getElementById('resultModal').style.display = 'none';
            gameArea.style.display = 'none';
            menuArea.style.display = 'block';
        }

        function getGCD(a, b) { return b ? getGCD(b, a % b) : a; }
        function formatSub(text) { return text.replace(/([0-9]+)/g, '<sub>$1</sub>'); }

        function buildFormula(c, a, subC, subA) {
            let cp = formatSub(c.formula);
            if(subC > 1) cp = c.poly ? `(${cp})<sub>${subC}</sub>` : `${cp}<sub>${subC}</sub>`;
            let ap = formatSub(a.formula);
            if(subA > 1) ap = a.poly ? `(${ap})<sub>${subA}</sub>` : `${ap}<sub>${subA}</sub>`;
            return cp + ap;
        }

        function buildName(c, a) {
            let cleanCName = c.name.replace(/ion/i, '').trim();
            let cleanAName = a.name.replace(/ion/i, '').trim();
            return `<span style="font-size:20px;">${cleanCName} ${cleanAName.toLowerCase()}</span>`;
        }

        function nextQuestion() {
            if (currentMode === 'speed' && score >= 10) { finishSpeedGame(); return; }
            
            isAnswered = false;
            let attempts = 0;
            let comboSignature = "";

            do {
                curC = cations[Math.floor(Math.random() * cations.length)];
                curA = anions[Math.floor(Math.random() * anions.length)];
                comboSignature = curC.formula + "_" + curA.formula;
                attempts++;
            } while ((usedQuestions.has(comboSignature) || !isValidCombination(curC, curA)) && attempts < 100);
            
            usedQuestions.add(comboSignature);
            
            let cSub = curA.charge, aSub = curC.charge;
            let common = getGCD(cSub, aSub);
            cSub /= common; aSub /= common;

            // 隨機決定出題情境 (0: 符號找符號, 1: 符號找名稱, 2: 名稱找符號)
            let scenario = Math.floor(Math.random() * 3);
            let options = [];
            let optionsSet = new Set();

            if (scenario === 0 || scenario === 1) {
                // 題目：化學符號
                questionEl.innerHTML = `<span>${curC.html} &nbsp;+&nbsp; ${curA.html}</span>`;
            } else {
                // 題目：化學名稱
                let cleanC = curC.name.replace(/ion/i, '').trim();
                let cleanA = curA.name.replace(/ion/i, '').trim();
                questionEl.innerHTML = `<span style="font-size:26px;">${cleanC} ion<br>+<br>${cleanA} ion</span>`;
            }

            if (scenario === 0 || scenario === 2) {
                // 選項：化學符號
                let correctHTML = buildFormula(curC, curA, cSub, aSub);
                options.push({html: correctHTML, isCorrect: true});
                optionsSet.add(correctHTML);

                while(options.length < 4) {
                    let rC = Math.floor(Math.random()*3)+1, rA = Math.floor(Math.random()*3)+1;
                    let fakeHTML = buildFormula(curC, curA, rC, rA);
                    if(!optionsSet.has(fakeHTML)) {
                        optionsSet.add(fakeHTML);
                        options.push({html: fakeHTML, isCorrect: false});
                    }
                }
            } else {
                // 選項：化學名稱 (情境 1)
                let correctHTML = buildName(curC, curA);
                options.push({html: correctHTML, isCorrect: true});
                optionsSet.add(correctHTML);

                while(options.length < 4) {
                    let randomA = anions[Math.floor(Math.random() * anions.length)];
                    let fakeHTML = buildName(curC, randomA);
                    if(!optionsSet.has(fakeHTML)) {
                        optionsSet.add(fakeHTML);
                        options.push({html: fakeHTML, isCorrect: false});
                    }
                }
            }

            // 渲染按鈕
            options.sort(() => 0.5 - Math.random());
            optionsArea.innerHTML = '';
            options.forEach(opt => {
                let btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerHTML = opt.html;
                btn.onclick = () => checkAnswer(btn, opt.isCorrect);
                optionsArea.appendChild(btn);
            });
        }

        function checkAnswer(btn, isCorrect) {
            if(isAnswered) return;
            isAnswered = true;

            if(isCorrect) {
                btn.classList.add('correct');
                score++;
                
                if (currentMode === 'speed') {
                    progressText.innerText = `進度: ${score}/10`;
                    batteryLevel.style.width = (score * 10) + "%";
                } else {
                    progressText.innerText = `已答對: ${score} 題`;
                    let fillPercent = (score % 10) * 10;
                    if (fillPercent === 0) fillPercent = 100;
                    batteryLevel.style.width = fillPercent + "%";
                }
                setTimeout(nextQuestion, 400); 
            } else {
                btn.classList.add('wrong');
                setTimeout(() => {
                    btn.classList.remove('wrong');
                    isAnswered = false;
                }, 1000); 
            }
        }

        function finishSpeedGame() {
            clearInterval(timerInterval);
            let finalTime = (Date.now() - startTime) / 1000;
            
            let history = JSON.parse(localStorage.getItem('myIonHistory') || '[]');
            let currentBest = history.length > 0 ? Math.min(...history.map(x => x.time)) : Infinity;
            
            if (finalTime < currentBest) currentBest = finalTime;
            
            history.unshift({ time: finalTime });
            localStorage.setItem('myIonHistory', JSON.stringify(history.slice(0, 5)));

            document.getElementById('finalTime').innerText = finalTime.toFixed(2) + "s";
            document.getElementById('bestTimeDisplay').innerText = currentBest.toFixed(2) + "s";
            document.getElementById('resultModal').style.display = 'flex';
        }

        // 防拷貝腳本
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.onselectstart = () => false;
        document.onkeydown = e => {
            if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && e.keyCode == 73) || (e.ctrlKey && e.keyCode == 85)) return false;
        };
    </script>
</body>
</html>
