<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ion Master 8.5 - 3lite Education</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffffff">
    <link rel="stylesheet" href="3lite-style.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <link rel="preload" href="data.js" as="script">
    <link rel="preload" href="audio.js" as="script">
    <link rel="preload" href="state.js" as="script">
    <link rel="preload" href="ui.js" as="script">
    <link rel="preload" href="game.js" as="script">
    <link rel="preload" href="app.js" as="script">
</head>
<body>
    <div class="fluid-bg" id="appBackground"></div>
    <div id="animLock" class="anim-lock"></div>
    <div class="fab-btn glass-panel" onclick="UI.toggleModal('ptModal', true)">📊</div>

    <div class="app-container">
        <header class="glass-panel player-profile">
            <div class="profile-left">
                <div class="player-title" id="playerTitle">Lab Rookie</div>
                <div class="player-subtitle" id="profileName">3lite Education</div>
            </div>
            <div class="profile-right">
                <div class="player-level">Lv.<span id="playerLevel">1</span></div>
                <div class="exp-text" id="expText">0 / 15 EXP</div>
                <div class="exp-bar-container"><div class="exp-bar" id="expBar"></div></div>
            </div>
            <div class="coin-badge glass-panel">🪙 <span id="mainCoinCount">0</span></div>
        </header>

        <main id="view-home" class="view-section active">
            <h1 class="ios-title">首頁</h1>
            <div id="pvpBanner" class="glass-panel pvp-banner" style="display:none;">
                ⚔️ 挑戰信！目標：<span id="pvpTargetTime"></span>秒 <br>
                <button class="ios-btn primary-btn mt-2" onclick="Game.start('pvp')">接受決鬥</button>
            </div>
            
            <button class="ios-btn epic-btn mb-2" onclick="UI.showLeaderboard()">🏆 全校化學排行榜</button>

            <div class="glass-panel quest-board">
                <h3 class="ios-subtitle">📋 每日委託 (Daily Quests)</h3>
                <div id="questList" class="quest-list"></div>
            </div>

            <button id="installAppBtn" class="ios-btn" style="display: none; background: #1c1c1e; color: white; margin-top: 15px;">📱 安裝到桌面 (專屬 App 版)</button>
            
            <button class="ios-btn warning-btn mt-3" onclick="UI.toggleModal('redeemModal', true)">🎁 兌換禮物碼 (Redeem Code)</button>
        </main>

        <main id="view-play" class="view-section">
            <h1 class="ios-title">測驗</h1>
            <div class="game-modes">
                <button class="ios-btn danger-btn" onclick="Game.start('speed')">⚡ 速度模式 (10題計時)</button>
                <button class="ios-btn info-btn mt-3" onclick="Game.start('practice')">🧠 基礎練習 (賺取代幣)</button>
                <button class="ios-btn epic-btn mt-3" onclick="Game.start('color')">🎨 色彩檢定 (高年級專屬)</button>
            </div>
            
            <div id="activeGameArea" style="display:none; margin-top:20px;">
                <div class="glass-panel status-bar">
                    <span id="progressText" class="highlight-text">進度: 0/10</span>
                    <span id="timerDisplay" class="timer-text">00:00.0</span>
                    <div class="battery"><div class="battery-level" id="batteryLevel"></div></div>
                </div>
                <div class="glass-panel ion-display" id="question"><span>載入中...</span></div>
                <div class="options-grid" id="optionsArea"></div>
                <button class="ios-btn cancel-btn mt-3" onclick="Game.quit()">放棄並返回</button>
            </div>
        </main>

        <main id="view-lab" class="view-section">
            <h1 class="ios-title">煉金</h1>
            <div class="glass-panel filter-scroll">
                <button class="filter-chip active" onclick="UI.filterLab('all')">全部</button>
                <button class="filter-chip" onclick="UI.filterLab('n')">N (15🪙)</button>
                <button class="filter-chip" onclick="UI.filterLab('r')">R (30🪙)</button>
                <button class="filter-chip" onclick="UI.filterLab('sr')">SR (80🪙)</button>
                <button class="filter-chip" onclick="UI.filterLab('ssr')">SSR (150🪙)</button>
            </div>
            <div class="gallery-grid" id="labGrid"></div>
        </main>

        <main id="view-gallery" class="view-section">
            <h1 class="ios-title">圖鑑 <span class="collection-count" id="collectionCount">0/184</span></h1>
            <div class="draw-actions">
                <button class="ios-btn warning-btn" onclick="Game.drawCard(1)">單抽 (5🪙)</button>
                <button class="ios-btn epic-btn" onclick="Game.drawCard(10)">十連抽 (45🪙) 🔥九折</button>
            </div>
            <div id="pityDisplay" style="text-align:center; font-size:14px; color:var(--apple-purple); font-weight:bold; margin-top:10px;">距離必中 SSR 還有 50 抽</div>
            <div class="glass-panel filter-scroll mt-2">
                <button class="filter-chip active" onclick="UI.filterGallery('all')">全部</button>
                <button class="filter-chip" onclick="UI.filterGallery('ssr')">SSR</button>
                <button class="filter-chip" onclick="UI.filterGallery('cation')">陽離子</button>
                <button class="filter-chip" onclick="UI.filterGallery('anion')">陰離子</button>
                <button class="filter-chip" onclick="UI.filterGallery('locked')">未解鎖</button>
            </div>
            <div class="gallery-grid" id="galleryGrid"></div>
        </main>
    </div>

    <nav class="glass-panel bottom-tab-bar">
        <div class="tab-item active" onclick="UI.switchView('home', this)">🏠<br><span>首頁</span></div>
        <div class="tab-item" onclick="UI.switchView('play', this)">⚡<br><span>測驗</span></div>
        <div class="tab-item" onclick="UI.switchView('lab', this)">🧪<br><span>煉金</span></div>
        <div class="tab-item" onclick="UI.switchView('gallery', this)">📚<br><span>圖鑑</span></div>
    </nav>

    <div id="loginModal" class="modal glass-modal" style="display:flex; z-index:9999; background: rgba(0,0,0,0.85);">
        <div class="modal-content glass-panel" style="margin: auto;">
            <h2 class="ios-title">🧪 登入實驗室</h2>
            <p class="ios-desc" style="margin-bottom:20px;">首次登入時輸入的密碼將成為您的永久密碼。</p>
            <input type="text" id="loginUsername" class="ios-input" placeholder="學號或暱稱" autocomplete="off">
            <input type="password" id="loginPasscode" class="ios-input" placeholder="設定/輸入密碼" autocomplete="off">
            <button class="ios-btn primary-btn mt-3" id="loginBtn" onclick="State.login()">進入系統</button>
        </div>
    </div>

    <div id="leaderboardModal" class="modal glass-modal">
        <div class="modal-content glass-panel">
            <h2 class="ios-title">🏆 菁英排行榜</h2>
            <div id="leaderboardContent" style="max-height: 400px; overflow-y: auto; text-align: left; margin: 15px 0;">
                載入中...
            </div>
            <button class="ios-btn cancel-btn mt-2" onclick="UI.toggleModal('leaderboardModal', false)">關閉</button>
        </div>
    </div>

    <div id="redeemModal" class="modal glass-modal">
        <div class="modal-content glass-panel">
            <input type="text" id="redeemInput" class="ios-input" placeholder="輸入禮物碼..." autocomplete="off">
            <button class="ios-btn primary-btn mt-3" onclick="Game.redeemCode()">✅ 確認兌換</button>
            <button class="ios-btn cancel-btn mt-2" onclick="UI.toggleModal('redeemModal', false)">關閉</button>
        </div>
    </div>
    
    <div id="resultModal" class="modal glass-modal"><div class="modal-content glass-panel" id="resultContent"></div></div>
    <div id="gachaModal" class="modal glass-modal"><div class="modal-content glass-panel transparent-panel" id="gachaContent"></div></div>
    <div id="ptModal" class="modal glass-modal"><div class="modal-content glass-panel"><img src="images/periodic_table.png" style="width:100%;"><button class="ios-btn cancel-btn mt-2" onclick="UI.toggleModal('ptModal', false)">關閉</button></div></div>
    <div id="whiteFlash" class="white-flash"></div>
    <div id="gachaAnimModal" class="modal glass-modal" style="z-index: 150;"><div class="gacha-anim-container">🧪</div><h3 id="gachaAnimText" style="color: white; margin-top: 40px; letter-spacing: 3px; text-shadow: 0 2px 5px rgba(0,0,0,0.5);">高能反應合成中...</h3></div>
    <div id="explosionModal" class="modal glass-modal" style="z-index: 200;"><div class="modal-content glass-panel" style="background: rgba(30, 20, 20, 0.9); border: 2px solid var(--legend);"><div class="explosion-anim">💥</div><h2 style="color: var(--legend); margin-top: 10px;">煉金爐爆炸！</h2><p style="color: #ccc; margin-bottom: 25px;">合成失敗... 代幣已化為灰燼。</p><button onclick="UI.toggleModal('explosionModal', false); Game.quit()" class="ios-btn danger-btn">收拾殘局</button></div></div>

    <script src="data.js"></script>
    <script src="audio.js"></script>
    <script src="state.js"></script>
    <script src="ui.js"></script>
    <script src="game.js"></script>
    <script src="app.js"></script>

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then(registration => {
            console.log('🧪 實驗室快取系統 (ServiceWorker) 啟動成功！');
          }).catch(error => {
            console.log('實驗室快取系統啟動失敗：', error);
          });
        });
      }
    </script>
</body>
</html>
